<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="computeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="securityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    FlowFi System Architecture
  </text>
  
  <!-- Client Layer -->
  <rect x="50" y="80" width="200" height="120" rx="10" fill="url(#clientGradient)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Client Layer
  </text>
  <rect x="70" y="130" width="60" height="30" rx="5" fill="white" stroke="#1d4ed8" stroke-width="1"/>
  <text x="100" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">
    Web App
  </text>
  <rect x="140" y="130" width="60" height="30" rx="5" fill="white" stroke="#1d4ed8" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">
    Mobile
  </text>
  
  <!-- CDN Layer -->
  <rect x="300" y="80" width="150" height="120" rx="10" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="375" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    CDN Layer
  </text>
  <rect x="320" y="130" width="110" height="30" rx="5" fill="white" stroke="#0891b2" stroke-width="1"/>
  <text x="375" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0891b2">
    CloudFront
  </text>
  
  <!-- API Layer -->
  <rect x="500" y="80" width="200" height="120" rx="10" fill="url(#apiGradient)" stroke="#059669" stroke-width="2"/>
  <text x="600" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    API Layer
  </text>
  <rect x="520" y="130" width="80" height="30" rx="5" fill="white" stroke="#059669" stroke-width="1"/>
  <text x="560" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#059669">
    API Gateway
  </text>
  <rect x="610" y="130" width="80" height="30" rx="5" fill="white" stroke="#059669" stroke-width="1"/>
  <text x="650" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#059669">
    WAF
  </text>
  
  <!-- Compute Layer -->
  <rect x="750" y="80" width="200" height="120" rx="10" fill="url(#computeGradient)" stroke="#d97706" stroke-width="2"/>
  <text x="850" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Compute Layer
  </text>
  <rect x="770" y="130" width="60" height="30" rx="5" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="800" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">
    Lambda
  </text>
  <rect x="840" y="130" width="60" height="30" rx="5" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="870" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">
    Step Fn
  </text>
  <rect x="910" y="130" width="60" height="30" rx="5" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="940" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">
    EventBridge
  </text>
  
  <!-- Data Layer -->
  <rect x="50" y="280" width="200" height="120" rx="10" fill="url(#dataGradient)" stroke="#7c3aed" stroke-width="2"/>
  <text x="150" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Data Layer
  </text>
  <rect x="70" y="330" width="60" height="30" rx="5" fill="white" stroke="#7c3aed" stroke-width="1"/>
  <text x="100" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">
    PostgreSQL
  </text>
  <rect x="140" y="330" width="60" height="30" rx="5" fill="white" stroke="#7c3aed" stroke-width="1"/>
  <text x="170" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">
    S3
  </text>
  <rect x="70" y="370" width="60" height="30" rx="5" fill="white" stroke="#7c3aed" stroke-width="1"/>
  <text x="100" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">
    DynamoDB
  </text>
  <rect x="140" y="370" width="60" height="30" rx="5" fill="white" stroke="#7c3aed" stroke-width="1"/>
  <text x="170" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">
    ElastiCache
  </text>
  
  <!-- AI/ML Services -->
  <rect x="300" y="280" width="200" height="120" rx="10" fill="#8b5cf6" stroke="#7c2d12" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    AI/ML Services
  </text>
  <rect x="320" y="330" width="60" height="30" rx="5" fill="white" stroke="#7c2d12" stroke-width="1"/>
  <text x="350" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c2d12">
    Bedrock
  </text>
  <rect x="390" y="330" width="60" height="30" rx="5" fill="white" stroke="#7c2d12" stroke-width="1"/>
  <text x="420" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c2d12">
    Textract
  </text>
  <rect x="460" y="330" width="60" height="30" rx="5" fill="white" stroke="#7c2d12" stroke-width="1"/>
  <text x="490" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c2d12">
    Comprehend
  </text>
  
  <!-- Security Layer -->
  <rect x="550" y="280" width="200" height="120" rx="10" fill="url(#securityGradient)" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Security Layer
  </text>
  <rect x="570" y="330" width="60" height="30" rx="5" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">
    Cognito
  </text>
  <rect x="640" y="330" width="60" height="30" rx="5" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">
    Secrets
  </text>
  <rect x="710" y="330" width="60" height="30" rx="5" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="740" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">
    IAM
  </text>
  
  <!-- Monitoring -->
  <rect x="800" y="280" width="200" height="120" rx="10" fill="#64748b" stroke="#475569" stroke-width="2"/>
  <text x="900" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Monitoring
  </text>
  <rect x="820" y="330" width="60" height="30" rx="5" fill="white" stroke="#475569" stroke-width="1"/>
  <text x="850" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    CloudWatch
  </text>
  <rect x="890" y="330" width="60" height="30" rx="5" fill="white" stroke="#475569" stroke-width="1"/>
  <text x="920" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    X-Ray
  </text>
  <rect x="960" y="330" width="60" height="30" rx="5" fill="white" stroke="#475569" stroke-width="1"/>
  <text x="990" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    CloudTrail
  </text>
  
  <!-- Connection Lines -->
  <path d="M 250 140 L 300 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 450 140 L 500 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 700 140 L 750 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <path d="M 150 200 L 150 280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 375 200 L 375 280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 600 200 L 600 280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 850 200 L 850 280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="450" width="900" height="120" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
  <text x="100" y="480" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">
    Architecture Layers Legend
  </text>
  
  <rect x="70" y="500" width="20" height="15" fill="url(#clientGradient)" rx="3"/>
  <text x="100" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Client Interface Layer</text>
  
  <rect x="220" y="500" width="20" height="15" fill="url(#apiGradient)" rx="3"/>
  <text x="250" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">API Gateway & Routing</text>
  
  <rect x="370" y="500" width="20" height="15" fill="url(#computeGradient)" rx="3"/>
  <text x="400" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Serverless Compute</text>
  
  <rect x="520" y="500" width="20" height="15" fill="url(#dataGradient)" rx="3"/>
  <text x="550" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Data Storage Layer</text>
  
  <rect x="670" y="500" width="20" height="15" fill="url(#securityGradient)" rx="3"/>
  <text x="700" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Security & Auth</text>
  
  <rect x="820" y="500" width="20" height="15" fill="#64748b" rx="3"/>
  <text x="850" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Monitoring & Logging</text>
</svg>