<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="storageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Expense Processing Data Flow
  </text>
  
  <!-- Step 1: User Upload -->
  <rect x="50" y="100" width="120" height="80" rx="10" fill="url(#userGradient)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    User Upload
  </text>
  <text x="110" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Document/Receipt
  </text>
  <text x="110" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Photo Upload
  </text>
  
  <!-- Step 2: Document Validation -->
  <rect x="220" y="100" width="120" height="80" rx="10" fill="url(#processingGradient)" stroke="#d97706" stroke-width="2"/>
  <text x="280" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Document
  </text>
  <text x="280" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Validation
  </text>
  <text x="280" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Format Check
  </text>
  
  <!-- Step 3: S3 Storage -->
  <rect x="390" y="100" width="120" height="80" rx="10" fill="url(#storageGradient)" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    S3 Storage
  </text>
  <text x="450" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Secure Storage
  </text>
  <text x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Encryption
  </text>
  
  <!-- Step 4: OCR Processing -->
  <rect x="560" y="100" width="120" height="80" rx="10" fill="url(#processingGradient)" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    OCR Processing
  </text>
  <text x="620" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Text Extraction
  </text>
  <text x="620" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    AWS Textract
  </text>
  
  <!-- Step 5: AI Categorization -->
  <rect x="730" y="100" width="120" height="80" rx="10" fill="url(#aiGradient)" stroke="#059669" stroke-width="2"/>
  <text x="790" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    AI Categorization
  </text>
  <text x="790" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    ML Model
  </text>
  <text x="790" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Bedrock AI
  </text>
  
  <!-- Step 6: Confidence Scoring -->
  <rect x="560" y="220" width="120" height="80" rx="10" fill="url(#processingGradient)" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Confidence
  </text>
  <text x="620" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Scoring
  </text>
  <text x="620" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Threshold Check
  </text>
  
  <!-- Decision Diamond -->
  <polygon points="730,240 790,220 850,240 790,260" fill="url(#processingGradient)" stroke="#d97706" stroke-width="2"/>
  <text x="790" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Confidence
  </text>
  <text x="790" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    > 80%?
  </text>
  
  <!-- Step 7a: Auto-Approve -->
  <rect x="730" y="300" width="120" height="80" rx="10" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="790" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Auto-Approve
  </text>
  <text x="790" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    High Confidence
  </text>
  <text x="790" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Automatic
  </text>
  
  <!-- Step 7b: Human Review -->
  <rect x="560" y="300" width="120" height="80" rx="10" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Human Review
  </text>
  <text x="620" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Low Confidence
  </text>
  <text x="620" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Manual Approval
  </text>
  
  <!-- Step 8: Database Storage -->
  <rect x="390" y="300" width="120" height="80" rx="10" fill="url(#storageGradient)" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Database
  </text>
  <text x="450" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    PostgreSQL
  </text>
  <text x="450" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Storage
  </text>
  
  <!-- Step 9: Financial Reports -->
  <rect x="220" y="300" width="120" height="80" rx="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="280" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Financial
  </text>
  <text x="280" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Reports
  </text>
  <text x="280" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    IFRS Compliant
  </text>
  
  <!-- Step 10: User Dashboard -->
  <rect x="50" y="300" width="120" height="80" rx="10" fill="url(#userGradient)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="110" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    User
  </text>
  <text x="110" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Dashboard
  </text>
  <text x="110" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Real-time View
  </text>
  
  <!-- Connection Lines -->
  <!-- Forward flow -->
  <path d="M 170 140 L 220 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 340 140 L 390 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 510 140 L 560 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 680 140 L 730 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision flow -->
  <path d="M 790 180 L 790 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 730 240 L 620 240" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 730 260 L 730 300" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 620 260 L 620 300" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Return flow -->
  <path d="M 620 340 L 510 340" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 790 340 L 680 340" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 450 340 L 340 340" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 280 340 L 170 340" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Processing Time Indicators -->
  <text x="145" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    ~2s
  </text>
  <text x="315" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    ~1s
  </text>
  <text x="485" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    ~3s
  </text>
  <text x="655" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    ~5s
  </text>
  <text x="825" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    ~2s
  </text>
  
  <!-- Legend -->
  <rect x="50" y="420" width="900" height="120" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
  <text x="100" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">
    Data Flow Legend
  </text>
  
  <rect x="70" y="470" width="20" height="15" fill="url(#userGradient)" rx="3"/>
  <text x="100" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">User Interface</text>
  
  <rect x="180" y="470" width="20" height="15" fill="url(#processingGradient)" rx="3"/>
  <text x="210" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Processing Layer</text>
  
  <rect x="310" y="470" width="20" height="15" fill="url(#storageGradient)" rx="3"/>
  <text x="340" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Storage Layer</text>
  
  <rect x="430" y="470" width="20" height="15" fill="url(#aiGradient)" rx="3"/>
  <text x="460" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">AI/ML Services</text>
  
  <rect x="550" y="470" width="20" height="15" fill="#10b981" rx="3"/>
  <text x="580" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Automated Approval</text>
  
  <rect x="710" y="470" width="20" height="15" fill="#f59e0b" rx="3"/>
  <text x="740" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Manual Review</text>
  
  <rect x="850" y="470" width="20" height="15" fill="#3b82f6" rx="3"/>
  <text x="880" y="482" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Reports & Analytics</text>
  
  <!-- Performance Metrics -->
  <text x="50" y="520" font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    Average Processing Time: 15-30 seconds total | AI Categorization: 95%+ accuracy | Auto-approval rate: 75%
  </text>
</svg>