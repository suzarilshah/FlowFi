<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frontendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="externalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    FlowFi API Integration Architecture
  </text>
  
  <!-- Frontend Layer -->
  <rect x="50" y="80" width="900" height="80" fill="url(#frontendGradient)" rx="10" stroke="#1d4ed8" stroke-width="2"/>
  <text x="500" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    Frontend Layer (React + TypeScript)
  </text>
  <text x="500" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">
    Web Application | Mobile Responsive | Real-time Updates | Dashboard Interface
  </text>
  
  <!-- API Gateway Layer -->
  <rect x="50" y="180" width="900" height="80" fill="url(#apiGradient)" rx="10" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    API Gateway Layer (AWS API Gateway)
  </text>
  <text x="500" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">
    Request Routing | Rate Limiting | Authentication | CORS | Logging
  </text>
  
  <!-- Backend Services Layer -->
  <rect x="50" y="280" width="900" height="200" fill="url(#serviceGradient)" rx="10" stroke="#7c3aed" stroke-width="2"/>
  <text x="500" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    Backend Services Layer (Node.js + TypeScript)
  </text>
  
  <!-- Individual Services -->
  <rect x="70" y="340" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="145" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Auth Service
  </text>
  <text x="145" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    JWT | User Mgmt
  </text>
  
  <rect x="240" y="340" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="315" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Document Service
  </text>
  <text x="315" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Upload | Processing
  </text>
  
  <rect x="410" y="340" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="485" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Expense Service
  </text>
  <text x="485" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    CRUD | Validation
  </text>
  
  <rect x="580" y="340" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="655" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    AI Service
  </text>
  <text x="655" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Categorization | OCR
  </text>
  
  <rect x="750" y="340" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="825" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Search Service
  </text>
  <text x="825" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    OpenSearch | Query
  </text>
  
  <rect x="70" y="420" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="145" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Report Service
  </text>
  <text x="145" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    IFRS | Analytics
  </text>
  
  <rect x="240" y="420" width="150" height="60" fill="#8b5cf6" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="315" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Notification Service
  </text>
  <text x="315" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Email | SMS
  </text>
  
  <!-- External Services Layer -->
  <rect x="50" y="500" width="900" height="120" fill="url(#externalGradient)" rx="10" stroke="#059669" stroke-width="2"/>
  <text x="500" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    External Services Integration
  </text>
  
  <!-- External Services -->
  <rect x="70" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="120" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    AWS S3
  </text>
  
  <rect x="190" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="240" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    AWS Textract
  </text>
  
  <rect x="310" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="360" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Bedrock AI
  </text>
  
  <rect x="430" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="480" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    OpenSearch
  </text>
  
  <rect x="550" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    PostgreSQL
  </text>
  
  <rect x="670" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="720" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Azure DI
  </text>
  
  <rect x="790" y="560" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="1"/>
  <text x="840" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    SendGrid
  </text>
  
  <!-- API Endpoints Legend -->
  <rect x="50" y="640" width="900" height="50" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
  <text x="100" y="665" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">
    Key API Endpoints:
  </text>
  <text x="250" y="665" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">
    POST /api/auth/login | GET /api/expenses | POST /api/documents/upload | GET /api/search | POST /api/reports/generate
  </text>
  
  <!-- Connection Indicators -->
  <!-- Frontend to API Gateway -->
  <path d="M 500 160 L 500 180" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- API Gateway to Services -->
  <path d="M 500 260 L 500 280" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Services to External -->
  <path d="M 500 480 L 500 500" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Horizontal connections -->
  <path d="M 220 370 L 240 370" stroke="#64748b" stroke-width="1"/>
  <path d="M 390 370 L 410 370" stroke="#64748b" stroke-width="1"/>
  <path d="M 560 370 L 580 370" stroke="#64748b" stroke-width="1"/>
  <path d="M 730 370 L 750 370" stroke="#64748b" stroke-width="1"/>
  
  <path d="M 220 450 L 240 450" stroke="#64748b" stroke-width="1"/>
  <path d="M 390 450 L 410 450" stroke="#64748b" stroke-width="1"/>
  
  <!-- Security & Performance Indicators -->
  <text x="50" y="620" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    Security: JWT Authentication | HTTPS | Rate Limiting | CORS | Input Validation
  </text>
  <text x="550" y="620" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    Performance: Caching | Connection Pooling | Async Processing | CDN Integration
  </text>
</svg>